<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Loading -->
    <div id="view-loading" class="view">
      <div class="logo">NEXUS</div>
      <p class="text-muted text-center subtext">Personal CRM</p>
      <div class="loading-spinner"></div>
    </div>

    <!-- Setup: Configure Supabase -->
    <div id="view-setup" class="view hidden">
      <div class="logo">NEXUS</div>
      <p class="text-muted text-center subtext">Personal CRM</p>
      <p class="text-muted text-center mb-3 mt-2">Connect to your Nexus cloud to save and sync contacts.</p>
      <form id="setup-form">
        <div class="field">
          <label>Supabase URL</label>
          <input type="url" id="setup-url" placeholder="https://xxx.supabase.co" required>
        </div>
        <div class="field">
          <label>Anon Key</label>
          <input type="text" id="setup-key" placeholder="eyJ..." required>
        </div>
        <button type="submit" class="btn btn-primary w-full">Connect</button>
        <p id="setup-error" class="text-error hidden"></p>
      </form>
    </div>

    <!-- Login -->
    <div id="view-login" class="view hidden">
      <div class="logo">NEXUS</div>
      <p class="text-muted text-center subtext">Personal CRM</p>
      <p class="text-muted text-center mb-3 mt-2">Sign in to your Nexus account to save contacts.</p>
      <form id="login-form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary w-full">Sign In</button>
        <p id="login-error" class="text-error hidden"></p>
      </form>
    </div>

    <!-- Main (authenticated) -->
    <div id="view-main" class="view hidden">
      <div class="header">
        <div class="logo-sm">NEXUS</div>
        <div class="user-info">
          <span id="user-email" class="text-muted text-xs"></span>
          <button id="btn-logout" class="btn btn-ghost btn-sm">Sign out</button>
        </div>
      </div>

      <!-- Contact info (on LinkedIn profile) -->
      <div id="contact-section" class="hidden">
        <div id="contact-card" class="card hidden">
          <div class="contact-header">
            <img id="contact-photo" class="avatar hidden" src="" alt="">
            <div>
              <div id="contact-name" class="text-bold"></div>
              <div id="contact-title" class="text-muted text-sm"></div>
            </div>
          </div>
          <div id="contact-details" class="contact-details"></div>

          <div class="actions mt-3">
            <button id="btn-add-note" class="btn btn-secondary btn-sm">Add Note</button>
            <button id="btn-set-reminder" class="btn btn-secondary btn-sm">Set Reminder</button>
          </div>

          <!-- Note form -->
          <div id="note-form" class="hidden mt-2">
            <textarea id="note-text" class="input" rows="3" placeholder="Add a note..."></textarea>
            <div class="flex gap-2 mt-1">
              <button id="btn-save-note" class="btn btn-primary btn-sm">Save</button>
              <button id="btn-cancel-note" class="btn btn-ghost btn-sm">Cancel</button>
            </div>
          </div>

          <!-- Reminder form -->
          <div id="reminder-form" class="hidden mt-2">
            <input type="text" id="reminder-message" class="input" placeholder="Reminder message...">
            <input type="date" id="reminder-date" class="input mt-1">
            <div class="flex gap-2 mt-1">
              <button id="btn-save-reminder" class="btn btn-primary btn-sm">Save</button>
              <button id="btn-cancel-reminder" class="btn btn-ghost btn-sm">Cancel</button>
            </div>
          </div>
        </div>

        <div id="contact-not-saved" class="card hidden">
          <p class="text-sm text-muted">This contact is not in Nexus yet.</p>
          <button id="btn-save-from-popup" class="btn btn-primary btn-sm mt-2">Save to Nexus</button>
        </div>
      </div>

      <!-- Not on LinkedIn profile page -->
      <div id="no-profile-section" class="hidden">
        <div class="card">
          <p class="text-sm text-muted text-center">Visit a LinkedIn profile to save or view a contact.</p>
        </div>
      </div>

      <!-- Quick Add -->
      <div class="mt-3">
        <button id="btn-quick-add" class="btn btn-outline w-full">Quick Add Contact</button>
      </div>

      <div id="quick-add-form" class="hidden mt-2">
        <div class="card">
          <h3 class="text-bold text-sm mb-2">Add Contact</h3>
          <form id="qa-form">
            <div class="flex gap-2">
              <div class="field flex-1">
                <label>First Name</label>
                <input type="text" id="qa-first" required>
              </div>
              <div class="field flex-1">
                <label>Last Name</label>
                <input type="text" id="qa-last" required>
              </div>
            </div>
            <div class="field">
              <label>Email</label>
              <input type="email" id="qa-email">
            </div>
            <div class="field">
              <label>Company</label>
              <input type="text" id="qa-company">
            </div>
            <div class="field">
              <label>How We Met</label>
              <input type="text" id="qa-how-met" placeholder="e.g., Conference, Intro from...">
            </div>
            <div class="flex gap-2">
              <button type="submit" class="btn btn-primary btn-sm">Save</button>
              <button type="button" id="btn-cancel-qa" class="btn btn-ghost btn-sm">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
