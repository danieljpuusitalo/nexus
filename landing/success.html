<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Nexus Pro!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center px-6">
  <div class="max-w-md text-center">
    <div class="w-16 h-16 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center">
      <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h1 class="text-3xl font-extrabold text-zinc-900 mb-3">You're all set!</h1>
    <p class="text-zinc-500 text-lg mb-8 leading-relaxed">
      Your Nexus Pro subscription is now active. Head back to the app — your plan will sync automatically.
    </p>
    <div class="space-y-3">
      <p class="text-sm text-zinc-400">
        You can close this tab and return to Nexus. Your Pro features are already unlocked.
      </p>
    </div>
    <div class="mt-10 pt-6 border-t border-zinc-100">
      <p class="text-xs text-zinc-400">
        Need help? <a href="mailto:support@nexuscrm.app" class="text-violet-600 hover:underline">support@nexuscrm.app</a>
      </p>
    </div>
  </div>
</body>
</html>
